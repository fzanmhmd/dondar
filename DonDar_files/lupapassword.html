<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - DonDar</title>
    <link rel="stylesheet" href="tampilandondar.css">
</head>
<body>
    <div class="card-login" style="gap:15px;">
        <h3 style="color:white; margin:0;">Reset Password</h3>

        <!-- Langkah 1: verifikasi no HP -->
        <div id="step1">
            <div class="input-login">
                <input type="text" id="nohp-reset" placeholder=" " required>
                <span>No. HP Terdaftar</span>
            </div>
            <br>
            <button class="submit" id="btn-verifikasi">Verifikasi</button>
        </div>

        <!-- Langkah 2: isi password baru (tersembunyi dulu) -->
        <div id="step2" style="display:none; flex-direction:column; align-items:center; gap:15px;">
            <p style="color:white; font-size:13px; margin:0;">Akun ditemukan! Masukkan password baru.</p>
            <div class="input-login">
                <input type="password" id="pw-baru" placeholder=" " required>
                <span>Password Baru</span>
            </div>
            <div class="input-login">
                <input type="password" id="pw-konfirmasi" placeholder=" " required>
                <span>Konfirmasi Password</span>
            </div>
            <button class="submit" id="btn-reset">Simpan Password</button>
        </div>

        <button class="submit" onclick="window.location.href='index.html'">Kembali</button>
    </div>

    <script>
        // Langkah 1: cari akun berdasarkan no HP
        document.getElementById('btn-verifikasi').addEventListener('click', function () {
            const nohp = document.getElementById('nohp-reset').value.trim();
            const dataPendonor = JSON.parse(localStorage.getItem('pendonor')) || [];
            const akun = dataPendonor.find(p => p.nohp === nohp);

            if (!akun) {
                alert('No. HP tidak ditemukan!');
            } else {
                // Tampilkan step 2
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'flex';
            }
        });

        // Langkah 2: simpan password baru
        document.getElementById('btn-reset').addEventListener('click', function () {
            const nohp = document.getElementById('nohp-reset').value.trim();
            const pwBaru = document.getElementById('pw-baru').value.trim();
            const pwKonfirmasi = document.getElementById('pw-konfirmasi').value.trim();

            if (pwBaru !== pwKonfirmasi) {
                alert('Password tidak cocok!'); return;
            }

            // Update password di localStorage
            const dataPendonor = JSON.parse(localStorage.getItem('pendonor'));
            const index = dataPendonor.findIndex(p => p.nohp === nohp);
            dataPendonor[index].password = pwBaru;
            localStorage.setItem('pendonor', JSON.stringify(dataPendonor));

            alert('Password berhasil direset! Silakan login.');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
