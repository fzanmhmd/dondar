<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minta Akses - DonDar</title>
    <link rel="stylesheet" href="tampilandondar.css">
</head>
<body>
    <div class="card-login" style="gap:15px;">
        <h3 style="color:white; margin:0;">Minta Akses Petugas</h3>
        <p style="color:white; font-size:12px; text-align:center; margin:0;">
            Permintaan akan diproses oleh admin.
        </p>

        <div class="input-login">
            <input type="text" id="nama-minta" placeholder=" " required>
            <span>Nama Lengkap</span>
        </div>
        <div class="input-login">
            <input type="text" id="nohp-minta" placeholder=" " required>
            <span>No. HP</span>
        </div>
        <div class="input-login">
            <input type="text" id="alasan" placeholder=" " required>
            <span>Alasan / Jabatan</span>
        </div>

        <button class="submit" id="btn-minta">Kirim Permintaan</button>
        <button class="submit" onclick="window.location.href='index.html'">Kembali</button>
    </div>

    <script>
        document.getElementById('btn-minta').addEventListener('click', function () {
            const nama = document.getElementById('nama-minta').value.trim();
            const nohp = document.getElementById('nohp-minta').value.trim();
            const alasan = document.getElementById('alasan').value.trim();

            if (!nama || !nohp || !alasan) {
                alert('Semua kolom harus diisi!'); return;
            }

            // Simpan permintaan
            const permintaan = JSON.parse(localStorage.getItem('permintaan_akses')) || [];
            permintaan.push({ nama, nohp, alasan, waktu: new Date().toLocaleString() });
            localStorage.setItem('permintaan_akses', JSON.stringify(permintaan));

            alert('Permintaan berhasil dikirim! Tunggu konfirmasi dari admin.');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
