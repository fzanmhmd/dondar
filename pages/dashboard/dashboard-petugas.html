<!-- dashboard-petugas.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Petugas - DonDar</title>
    <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
    <div class="card-login">
        <h2 style="color:white;" id="sambutan"></h2>
        <p style="color:white;">Selamat datang, Petugas!</p>
        <button class="submit" id="btn-logout">Logout</button>
    </div>

    <script>
        // Cek apakah sudah login
        const sesi = JSON.parse(localStorage.getItem('sesi'));
        if (!sesi || sesi.role !== 'petugas') {
            // Kalau belum login atau bukan petugas, tendang ke login
            window.location.href = '/index.html';
        }

        document.getElementById('sambutan').textContent = 'Halo, ' + sesi.nama + '!';

        document.getElementById('btn-logout').addEventListener('click', function () {
            localStorage.removeItem('sesi');
            window.location.href = '/index.html';
        });
    </script>
</body>
</html>
