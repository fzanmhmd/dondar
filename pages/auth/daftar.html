<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Pendonor - DonDar</title>
    <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
    <div class="card-login" style="gap:15px;">
        <div class="header-login">
            <img src="/assets/images/logodondar.png" alt="logoDonDar">
            <h1>Don<highligh>Dar</highligh></h1>
        </div>
        <h3 style="color:white; margin:0;">Daftar Pendonor</h3>

        <div class="input-login">
            <input type="text" id="nama" placeholder=" " required>
            <span>Nama Lengkap</span>
        </div>
        <div class="input-login">
            <input type="text" id="nohp" placeholder=" " required>
            <span>No. HP</span>
        </div>
        <div class="input-login">
            <input type="password" id="password" placeholder=" " required>
            <span>Password</span>
        </div>
        <div class="input-login">
            <input type="password" id="konfirmasi" placeholder=" " required>
            <span>Konfirmasi Password</span>
        </div>

        <button class="submit" id="btn-daftar">Daftar</button>
        <button class="submit" onclick="window.location.href='/index.html'">Kembali Login</button>
    </div>

    <script>
        document.getElementById('btn-daftar').addEventListener('click', function () {
            const nama = document.getElementById('nama').value.trim();
            const nohp = document.getElementById('nohp').value.trim();
            const password = document.getElementById('password').value.trim();
            const konfirmasi = document.getElementById('konfirmasi').value.trim();

            // Validasi semua diisi
            if (!nama || !nohp || !password || !konfirmasi) {
                alert('Semua kolom harus diisi!'); return;
            }

            // Validasi password cocok
            if (password !== konfirmasi) {
                alert('Password dan Konfirmasi tidak cocok!'); return;
            }

            // Validasi no HP minimal 10 angka
            if (nohp.length < 10) {
                alert('No. HP tidak valid!'); return;
            }

            // Ambil data pendonor yang sudah ada
            const dataPendonor = JSON.parse(localStorage.getItem('pendonor')) || [];

            // Cek apakah no HP sudah terdaftar
            const sudahAda = dataPendonor.find(p => p.nohp === nohp);
            if (sudahAda) {
                alert('No. HP sudah terdaftar!'); return;
            }

            // Simpan pendonor baru
            dataPendonor.push({ nama, nohp, password });
            localStorage.setItem('pendonor', JSON.stringify(dataPendonor));

            alert('Pendaftaran berhasil! Silakan login.');
            window.location.href = '/index.html';
        });
    </script>
</body>
</html>
