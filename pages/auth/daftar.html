<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Pendonor - DonDar</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <script src="../../assets/js/core/database.js" defer></script>
    <script src="../../assets/js/core/ui.js" defer></script>
    <script src="../../assets/js/pages/daftar.js" defer></script>
</head>
<body class="auth-page">
    <main class="auth-layout">
        <section class="auth-card" aria-labelledby="title-daftar">
            <div class="brand">
                <img src="../../assets/images/logodondar.png" alt="Logo DonDar">
                <div>
                    <p class="eyebrow">Pendonor Baru</p>
                    <h1 id="title-daftar">Daftar Don<span>Dar</span></h1>
                </div>
            </div>

            <form class="form-stack" id="form-daftar" novalidate>
                <div class="two-column-form">
                    <div class="field full">
                        <label for="nama">Nama Lengkap</label>
                        <input id="nama" type="text" autocomplete="name">
                    </div>
                    <div class="field">
                        <label for="nohp">No. HP</label>
                        <input id="nohp" type="tel" autocomplete="tel">
                    </div>
                    <div class="field">
                        <label for="golongan">Golongan Darah</label>
                        <select id="golongan">
                            <option>A+</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>B-</option>
                            <option>AB+</option>
                            <option>AB-</option>
                            <option>O+</option>
                            <option>O-</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="usia">Usia</label>
                        <input id="usia" type="number" min="17" value="17">
                    </div>
                    <div class="field">
                        <label for="berat">Berat Badan</label>
                        <input id="berat" type="number" min="40" value="45">
                    </div>
                    <div class="field full">
                        <label for="kota">Kota</label>
                        <input id="kota" type="text" placeholder="Contoh: Bandung">
                    </div>
                    <div class="field">
                        <label for="password">Password</label>
                        <input id="password" type="password" autocomplete="new-password">
                    </div>
                    <div class="field">
                        <label for="konfirmasi">Konfirmasi Password</label>
                        <input id="konfirmasi" type="password" autocomplete="new-password">
                    </div>
                </div>
                <button class="btn primary" type="submit">Daftar</button>
                <a class="text-link" href="../../index.html">Kembali login</a>
            </form>
        </section>

        <aside class="info-panel">
            <h2>Data yang Disimpan</h2>
            <p class="muted">Aplikasi ini masih demo. Data pendonor disimpan di localStorage browser untuk latihan alur aplikasi.</p>
        </aside>
    </main>
</body>
</html>
