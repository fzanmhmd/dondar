<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - DonDar</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <script src="../../assets/js/core/database.js" defer></script>
    <script src="../../assets/js/core/ui.js" defer></script>
    <script src="../../assets/js/pages/lupa-password.js" defer></script>
</head>
<body class="auth-page">
    <main class="auth-layout">
        <section class="auth-card" aria-labelledby="title-reset">
            <div class="brand">
                <img src="../../assets/images/logodondar.png" alt="Logo DonDar">
                <div>
                    <p class="eyebrow">Akun Pendonor</p>
                    <h1 id="title-reset">Reset Password</h1>
                </div>
            </div>

            <div id="step-verifikasi">
                <form class="form-stack" id="form-verifikasi" novalidate>
                    <div class="field">
                        <label for="nohp-reset">No. HP Terdaftar</label>
                        <input id="nohp-reset" type="tel" autocomplete="tel">
                    </div>
                    <button class="btn primary" type="submit">Verifikasi</button>
                    <a class="text-link" href="../../index.html">Kembali login</a>
                </form>
            </div>

            <div id="step-password" hidden>
                <form class="form-stack" id="form-reset" novalidate>
                    <div class="field">
                        <label for="pw-baru">Password Baru</label>
                        <input id="pw-baru" type="password" autocomplete="new-password">
                    </div>
                    <div class="field">
                        <label for="pw-konfirmasi">Konfirmasi Password</label>
                        <input id="pw-konfirmasi" type="password" autocomplete="new-password">
                    </div>
                    <button class="btn primary" type="submit">Simpan Password</button>
                    <a class="text-link" href="../../index.html">Kembali login</a>
                </form>
            </div>
        </section>

        <aside class="info-panel">
            <h2>Alur Reset</h2>
            <p class="muted">Masukkan No. HP yang terdaftar, lalu buat password baru jika akun ditemukan.</p>
        </aside>
    </main>
</body>
</html>
