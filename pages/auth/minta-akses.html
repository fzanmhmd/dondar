<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minta Akses Petugas - DonDar</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <script src="../../assets/js/core/database.js" defer></script>
    <script src="../../assets/js/core/ui.js" defer></script>
    <script src="../../assets/js/pages/minta-akses.js" defer></script>
</head>
<body class="auth-page">
    <main class="auth-layout">
        <section class="auth-card" aria-labelledby="title-akses">
            <div class="brand">
                <img src="../../assets/images/logodondar.png" alt="Logo DonDar">
                <div>
                    <p class="eyebrow">Petugas Baru</p>
                    <h1 id="title-akses">Minta Akses</h1>
                </div>
            </div>

            <form class="form-stack" id="form-minta-akses" novalidate>
                <div class="field">
                    <label for="nama-minta">Nama Lengkap</label>
                    <input id="nama-minta" type="text" autocomplete="name">
                </div>
                <div class="field">
                    <label for="nohp-minta">No. HP</label>
                    <input id="nohp-minta" type="tel" autocomplete="tel">
                </div>
                <div class="field">
                    <label for="alasan">Alasan / Jabatan</label>
                    <textarea id="alasan" placeholder="Contoh: relawan donor darah wilayah kecamatan"></textarea>
                </div>
                <button class="btn primary" type="submit">Kirim Permintaan</button>
                <a class="text-link" href="../../index.html">Kembali login</a>
            </form>
        </section>

        <aside class="info-panel">
            <h2>Proses Akses</h2>
            <p class="muted">Permintaan masuk ke dashboard petugas dan bisa disetujui dari menu akses.</p>
        </aside>
    </main>
</body>
</html>
